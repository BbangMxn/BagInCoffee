<!doctype html>
<html>
    <head>
        <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
        <base href="$FLUTTER_BASE_HREF" />

        <meta charset="UTF-8" />
        <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
        <meta
            name="description"
            content="BagIn Coffee - 나만의 커피 추출 기록"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- iOS meta tags & icons -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="BagIn Coffee" />
        <link rel="apple-touch-icon" href="icons/Icon-192.png" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="favicon.png" />

        <title>BagIn Coffee</title>
        <link rel="manifest" href="manifest.json" />

        <style>
            /* 로딩 화면 스타일 */
            .loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #ffffff;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                transition: opacity 0.3s ease-out;
            }

            .loading-screen.fade-out {
                opacity: 0;
                pointer-events: none;
            }

            .loading-logo {
                width: 80px;
                height: 80px;
                margin-bottom: 24px;
                animation: pulse 1.5s ease-in-out infinite;
            }

            .loading-title {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                font-size: 28px;
                font-weight: 700;
                color: #000000;
                margin-bottom: 8px;
                letter-spacing: -0.5px;
            }

            .loading-subtitle {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                font-size: 14px;
                color: #6b7280;
                margin-bottom: 32px;
            }

            .loading-spinner {
                width: 40px;
                height: 40px;
                border: 3px solid #f3f4f6;
                border-top: 3px solid #000000;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            .loading-progress {
                margin-top: 16px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                font-size: 12px;
                color: #9ca3af;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
                50% {
                    transform: scale(1.05);
                    opacity: 0.8;
                }
            }

            /* 커피 아이콘 SVG */
            .coffee-icon {
                width: 80px;
                height: 80px;
            }
        </style>
    </head>
    <body>
        <!-- 로딩 화면 -->
        <div id="loading-screen" class="loading-screen">
            <!-- 로고 이미지 -->
            <img
                class="loading-logo"
                src="assets/assets/images/logo.png"
                alt="BagIn Logo"
                onerror="this.style.display = 'none'"
            />
            <div class="loading-title">BagIn</div>
            <div class="loading-subtitle">나만의 커피 추출 기록</div>
            <div class="loading-spinner"></div>
            <div class="loading-progress">로딩 중...</div>
        </div>

        <script src="flutter_bootstrap.js" async></script>
        <script>
            // Flutter 앱이 로드되면 로딩 화면 숨기기
            window.addEventListener("flutter-first-frame", function () {
                const loadingScreen = document.getElementById("loading-screen");
                if (loadingScreen) {
                    loadingScreen.classList.add("fade-out");
                    setTimeout(() => {
                        loadingScreen.style.display = "none";
                    }, 300);
                }
            });
        </script>
    </body>
</html>
