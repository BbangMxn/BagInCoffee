name: bagin_coffee
description: "BagIn Coffee - 커피 애호가를 위한 소셜 플랫폼"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.8.0+1
  http: ^1.2.2
  crypto: ^3.0.6

  # Supabase
  supabase_flutter: ^2.8.4

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Storage
  shared_preferences: ^2.3.5

  # Image
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.7
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  go_router: ^15.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#276EF1"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
